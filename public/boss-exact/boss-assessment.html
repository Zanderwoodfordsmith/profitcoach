<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The BOSS Diagnostic — Get your score in 10 minutes · The Profit Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--bg-canvas); color: var(--fg-primary); overflow-x: hidden; }
  a { color: inherit; }
  img { max-width: 100%; display: block; }
  ::selection { background: rgba(12,82,144,0.18); }

  .pc-container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }
  .pc-section { padding: 120px 0; position: relative; }
  .pc-section--tight { padding: 88px 0; }
  @media (max-width: 720px) {
    .pc-section { padding: 72px 0; }
    .pc-container { padding: 0 20px; }
  }

  .pc-eyebrow { font-size: 14px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; color: var(--pc-chathams-600); }

  .pc-btn { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-sans); font-weight: 600; font-size: 15px; padding: 16px 28px; border-radius: 9999px; border: 1px solid transparent; text-decoration: none; cursor: pointer; transition: filter 200ms var(--ease-out), box-shadow 200ms var(--ease-out), background 200ms var(--ease-out), border-color 200ms var(--ease-out), transform 100ms var(--ease-out); white-space: nowrap; }
  .pc-btn--primary { background: linear-gradient(135deg,#0c5290,#063056); color: #fff; box-shadow: 0 16px 40px -14px rgba(12,82,144,0.55); }
  .pc-btn--secondary { background: rgba(255,255,255,0.7); color: var(--pc-chathams-600); border: 1px solid rgba(12,82,144,0.18); backdrop-filter: blur(8px); }

  .reveal { opacity: 0; transform: translateY(12px); transition: opacity 600ms var(--ease-out), transform 600ms var(--ease-out); }
  .reveal.is-in { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

  .pc-card { background: #fff; border: 1px solid var(--pc-slate-200); border-radius: 24px; padding: 32px; transition: border-color 250ms var(--ease-out), box-shadow 250ms var(--ease-out), transform 250ms var(--ease-out); }
  .pc-card:hover { border-color: rgba(66,161,238,0.35); box-shadow: 0 12px 32px -12px rgba(15,23,42,0.10); transform: translateY(-4px); }

  .mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1, "lnum" 1; }

  @media (prefers-reduced-motion: no-preference) {
    html { scroll-behavior: smooth; }
  }

  #score-va-badge.is-on {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    max-width: min(420px, calc(100vw - 16px));
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
  <div
    id="score-va-badge"
    style="display:none;pointer-events:none;position:fixed;bottom:8px;right:8px;z-index:9999;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:9px;font-weight:500;letter-spacing:0.05em;color:rgba(100,116,139,0.7)"
    aria-hidden="true"
  ></div>
  <div
    id="score-company-badge"
    style="display:none;pointer-events:none;position:fixed;bottom:32px;right:8px;z-index:9998;max-width:min(280px,calc(100vw - 16px));font-family:ui-sans-serif,system-ui,sans-serif;font-size:11px;font-weight:600;color:rgba(12,82,144,0.85);text-align:right;line-height:1.25"
    aria-hidden="true"
  ></div>
  <script>
    try {
      var params = new URLSearchParams(window.location.search);
      if (params.get("va") === "1") {
        var b = document.getElementById("score-va-badge");
        if (b) {
          var coach = params.get("va_coach");
          if (!coach && typeof sessionStorage !== "undefined") {
            try {
              coach = sessionStorage.getItem("pc_boss_va_coach");
              sessionStorage.removeItem("pc_boss_va_coach");
            } catch (e2) {}
          }
          if (coach) coach = String(coach).trim();
          b.textContent = coach ? ("VA · " + coach) : "VA";
          b.classList.add("is-on");
          b.style.display = "flex";
          if (params.has("va_coach") && typeof history !== "undefined" && history.replaceState) {
            try {
              var u = new URL(window.location.href);
              u.searchParams.delete("va_coach");
              history.replaceState({}, "", u.pathname + u.search + u.hash);
            } catch (e3) {}
          }
        }
      }
      var company = params.get("company");
      if (company && typeof company === "string") {
        company = company.replace(/[\u0000-\u001F\u007F]/g, "").trim().slice(0, 80);
      } else {
        company = "";
      }
      if (company) {
        var bc = document.getElementById("score-company-badge");
        if (bc) {
          bc.textContent = company;
          bc.style.display = "block";
          if (params.has("company") && typeof history !== "undefined" && history.replaceState) {
            try {
              var u2 = new URL(window.location.href);
              u2.searchParams.delete("company");
              history.replaceState({}, "", u2.pathname + u2.search + u2.hash);
            } catch (e4) {}
          }
        }
      }
    } catch (e) {}
  </script>
  <div id="root"></div>

  <script>
    window.bossSmoothScrollTo = function (targetId, e) {
      if (e && typeof e.preventDefault === "function") e.preventDefault();
      var el = document.getElementById(targetId);
      if (!el) return false;
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      el.scrollIntoView({ behavior: reduce ? "auto" : "smooth", block: "start" });
      return false;
    };
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/Icons.jsx"></script>
  <script type="text/babel" src="src/BossWheel.jsx"></script>
  <script type="text/babel" src="src/Header.jsx"></script>
  <script type="text/babel" src="src/CloseSections.jsx"></script>
  <script type="text/babel" src="src/BossHero.jsx"></script>
  <script type="text/babel" src="src/BossSections.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;
    function App() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); } });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
      return (
        <>
          <BossHero />
          <WhatsInside />
          <HowToReport />
          <SampleQuestion />
          <MidCTA />
          <FounderNote />
          <BossFAQs />
          <FinalStartCTA />
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
